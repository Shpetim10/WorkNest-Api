spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: worknest-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:worknest_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:admin@example.com}
    password: ${MAIL_PASSWORD:password}
    protocol: ${MAIL_PROTOCOL:smtp}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

server:
  port: ${APP_PORT:8080}
  # Honour X-Forwarded-* / Forwarded headers sent by trusted reverse-proxies
  # (Cloudflare Tunnel, nginx, AWS ALB, etc.).  NATIVE delegates to the
  # servlet container (Tomcat) which handles the full RFC 7239 Forwarded header
  # in addition to X-Forwarded-{For,Proto,Host,Port}.
  forward-headers-strategy: NATIVE

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  frontend:
    activation-link-base: ${APP_FRONTEND_ACTIVATION_LINK_BASE:https://app.worknest.local/activate-invitation}
    reset-password-link-base: ${APP_FRONTEND_RESET_PASSWORD_LINK_BASE:https://app.worknest.local/reset-password}
  media:
    local-root: ${APP_MEDIA_LOCAL_ROOT:storage/media}
  mail:
    from-address: ${MAIL_FROM_ADDRESS:info@worknest.com}
    from-name: ${MAIL_FROM_NAME:WorkNest}
    reply-to: ${MAIL_REPLY_TO:${MAIL_FROM_ADDRESS:info@worknest.com}}
  security:
    allowed-public-paths:
      - /api/v1/auth/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/health
    cors:
      # Placeholder CORS config for web + React Native (Expo) clients.
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,exp://127.0.0.1:19000}
      allowed-methods: ${APP_SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${APP_SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With,X-Company-ID}
      exposed-headers: ${APP_SECURITY_CORS_EXPOSED_HEADERS:Authorization,Location}
      allow-credentials: ${APP_SECURITY_CORS_ALLOW_CREDENTIALS:true}
      max-age-seconds: ${APP_SECURITY_CORS_MAX_AGE_SECONDS:3600}
    jwt:
      issuer: worknest-api
      access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:PT30M}
      refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:P7D}
      secret-base64: ${JWT_SECRET_BASE64}

logging:
  level:
    root: INFO
