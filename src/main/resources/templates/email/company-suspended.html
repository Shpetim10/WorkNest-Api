<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Suspended</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #c0392b; font-size: 24px; }
        .content { margin-bottom: 30px; }
        .details { background-color: #fdf5f5; padding: 20px; border-radius: 6px; border-left: 4px solid #e74c3c; margin: 20px 0; }
        .reason-label { font-weight: bold; color: #c0392b; margin-bottom: 6px; }
        .reason-text { color: #4B5563; font-style: italic; }
        .footer { font-size: 0.9em; color: #7f8c8d; text-align: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="${#messages.msg('email.company-suspended.subject', companyName)}">Account Suspended</h1>
    </div>
    <div class="content">
        <p th:text="${#messages.msg('email.company-suspended.greeting')}">Hello,</p>

        <p th:text="${#messages.msg('email.company-suspended.intro', companyName)}">Your company account has been suspended.</p>

        <div class="details">
            <p class="reason-label" th:text="${#messages.msg('email.company-suspended.reason-label')}">Reason for suspension:</p>
            <p class="reason-text" th:text="${reason}">Reason</p>
        </div>

        <p th:text="${#messages.msg('email.company-suspended.contact')}">If you believe this is a mistake, please contact WorkNest support.</p>
    </div>
    <div class="footer">
        <p th:text="${#messages.msg('email.company-suspended.footer')}">This is an automated notification from the WorkNest platform.</p>
        <p>
            <span th:text="${#messages.msg('email.company-suspended.signoff')}">Best regards,</span><br>
            <strong th:text="${fromName}">WorkNest Team</strong>
        </p>
    </div>
</div>
</body>
</html>
