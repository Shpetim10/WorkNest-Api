<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; font-size: 24px; }
        .content { margin-bottom: 30px; }
        .details { background-color: #f9f9f9; padding: 20px; border-radius: 6px; border-left: 4px solid #e67e22; margin: 20px 0; }
        .button-container { text-align: center; margin: 30px 0; }
        .button { background-color: #e67e22; color: #ffffff; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; }
        .footer { font-size: 0.9em; color: #7f8c8d; text-align: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        .link { word-break: break-all; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="${#messages.msg('email.password-reset.subject', companyName)}">Reset your password</h1>
    </div>
    <div class="content">
        <p th:text="${#messages.msg('email.password-reset.greeting', recipientName)}">Hello,</p>

        <p th:text="${#messages.msg('email.password-reset.intro', companyName)}">You requested a password reset.</p>

        <div class="details">
            <p th:text="${#messages.msg('email.password-reset.instructions')}">Use the button below to reset your password.</p>
            <p th:text="${#messages.msg('email.password-reset.expiry')}">This link expires in 24 hours.</p>
        </div>

        <div class="button-container">
            <a th:href="${resetLink}" class="button" th:text="${#messages.msg('email.password-reset.button')}">Reset password</a>
        </div>

        <p th:text="${#messages.msg('email.password-reset.fallback')}">If the button does not work, use this link:</p>
        <p class="link"><a th:href="${resetLink}" th:text="${resetLink}">Reset link</a></p>
    </div>
    <div class="footer">
        <p th:text="${#messages.msg('email.password-reset.footer')}">If you did not request this, ignore this email.</p>
        <p>
            <span th:text="${#messages.msg('email.password-reset.signoff')}">Best regards,</span><br>
            <strong th:text="${fromName}">WorkNest Team</strong>
        </p>
    </div>
</div>
</body>
</html>
