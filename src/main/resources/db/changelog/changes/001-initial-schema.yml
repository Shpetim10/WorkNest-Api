databaseChangeLog:
  - changeSet:
      id: 202603302354-1
      author: antigravity
      comment: Initial schema creation
      changes:
        - createTable:
            tableName: companies
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: contact_email
                  type: VARCHAR(255)
              - column:
                  name: timezone
                  type: VARCHAR(100)
                  defaultValue: UTC
                  constraints:
                    nullable: false
              - column:
                  name: locale
                  type: VARCHAR(10)
                  defaultValue: en
                  constraints:
                    nullable: false
              - column:
                  name: data_retention_days
                  type: INTEGER
                  defaultValue: 90
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: deletion_scheduled_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_companies_slug
            tableName: companies
            columns:
              - column:
                  name: slug
        - createIndex:
            indexName: idx_companies_status
            tableName: companies
            columns:
              - column:
                  name: status

